{% extends "base.html" %}

{% block content %}
<h1>History for {{ code }}</h1>
<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Close</th>
            <th>High</th>
            <th>Low</th>
            <th>Volume</th>
        </tr>
    </thead>
    <tbody>
        {% for item in history %}
        <tr>
            <td>{{ item.date }}</td>
            <td>{{ item.priceClose }}</td>
            <td>{{ item.priceDayHigh }}</td>
            <td>{{ item.priceDayLow }}</td>
            <td>{{ item.volume }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
